version: "3.9"

services:
  redis:
    image: docker.io/library/redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redisinsight:
    image: docker.io/redis/redisinsight:latest
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped

  kafka:
    image: docker.io/apache/kafka:4.3.0
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://${KAFKA_EXTERNAL_HOST:-localhost}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    restart: unless-stopped

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app-secret}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  headlamp:
    image: ghcr.io/headlamp-k8s/headlamp:latest
    profiles:
      - k8s-ui
    command:
      - /headlamp/headlamp-server
      - -in-cluster=false
      - -plugins-dir=/headlamp/plugins
      - -kubeconfig=/home/headlamp/.config/Headlamp/kubeconfigs/config
      - -port=4466
      - -host=0.0.0.0
      - -html-static-dir=/headlamp/frontend
    ports:
      - "4466:4466"
    volumes:
      - ${KUBECONFIG_PATH:-./.kube/config}:/home/headlamp/.config/Headlamp/kubeconfigs/config:ro,Z
    restart: unless-stopped

  graylog-mongodb:
    image: docker.io/library/mongo:8.0
    profiles:
      - graylog
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${GRAYLOG_MONGO_USER:-graylog}
      MONGO_INITDB_ROOT_PASSWORD: ${GRAYLOG_MONGO_PASSWORD:-graylog-mongo-secret}
    volumes:
      - graylog_mongo_data:/data/db
    restart: unless-stopped

  graylog-opensearch:
    image: docker.io/opensearchproject/opensearch:2.19.1
    profiles:
      - graylog
    environment:
      cluster.name: graylog-opensearch
      node.name: graylog-opensearch
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: ${GRAYLOG_OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${GRAYLOG_OPENSEARCH_ADMIN_PASSWORD:-Graylog@OpenSearch1}
      plugins.security.disabled: "true"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - graylog_opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped

  graylog:
    image: docker.io/graylog/graylog:6.2
    profiles:
      - graylog
    depends_on:
      - graylog-mongodb
      - graylog-opensearch
    ports:
      - "9000:9000"
      - "12201:12201/udp"
      - "1514:1514/udp"
    environment:
      GRAYLOG_PASSWORD_SECRET: ${GRAYLOG_PASSWORD_SECRET:-somepasswordpepper}
      GRAYLOG_ROOT_PASSWORD_SHA2: ${GRAYLOG_ROOT_PASSWORD_SHA2:-8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918}
      GRAYLOG_HTTP_EXTERNAL_URI: ${GRAYLOG_HTTP_EXTERNAL_URI:-http://localhost:9000/}
      GRAYLOG_MONGODB_URI: ${GRAYLOG_MONGODB_URI:-mongodb://graylog:graylog-mongo-secret@graylog-mongodb:27017/graylog?authSource=admin}
      GRAYLOG_ELASTICSEARCH_HOSTS: ${GRAYLOG_ELASTICSEARCH_HOSTS:-http://graylog-opensearch:9200}
    volumes:
      - graylog_data:/usr/share/graylog/data
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:12.0.0
    profiles:
      - grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ${GRAFANA_INSTALL_PLUGINS:-}
    volumes:
      - grafana_data:/var/lib/grafana
      - ${GRAFANA_PROVISIONING_PATH:-./grafana/provisioning}:/etc/grafana/provisioning:ro,Z
    restart: unless-stopped

volumes:
  redis_data:
  redisinsight_data:
  kafka_data:
  postgres_data:
  graylog_mongo_data:
  graylog_opensearch_data:
  graylog_data:
  grafana_data: